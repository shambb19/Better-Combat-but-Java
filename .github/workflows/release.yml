name: dnd_combat_but_better

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Build with Maven
        # We pass the dynamic name here. Note: XML doesn't like quotes in properties,
        # so we'll construct the full string in the POM or just pass the tag.
        run: mvn clean package -Dapp.tag=${{ github.ref_name }}

      - name: Create Native Installer (CLI Manual)
        # Using the ref_name directly in the jpackage command for the filename
        run: |
          jpackage `
          --input target/ `
          --name "DnD Red Bull Edition ${{ github.ref_name }}" `
          --main-jar "dnd-combat-jar-with-dependencies.jar" `
          --main-class __main.Main `
          --type exe `
          --win-console `
          --dest dist/

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}