name: dnd_combat_but_better

on:
  push:
    tags:
      - 'v*' # This triggers the script whenever you push a tag like v1.0

permissions:
  contents: write

jobs:
  qodana:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: 'Qodana Scan'
        uses: JetBrains/qodana-action@v2024.1
        env:
          QODANA_TOKEN: ${{ secrets.QODANA_TOKEN }}

  build-and-release:
    needs: qodana
    runs-on: windows-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Build with Maven
        run: mvn clean package

      - name: Create Native Installer
        run: |
          jpackage `
          --input target/ `
          --name "DndCombat" `
          --main-jar "0-1.0-SNAPSHOT-jar-with-dependencies.jar" `
          --main-class YOUR_MAIN_CLASS_HERE `
          --type exe `
          --dest dist/

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}